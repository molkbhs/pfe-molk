<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - BusinessApp</title>
    <link rel="icon" type="image/png" href="assets/img/logo.png">
    <link rel="apple-touch-icon" href="assets/img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="css/page-bg.css" rel="stylesheet">
    <link href="css/app-ux.css" rel="stylesheet">
    <link href="css/charts-global-theme.css" rel="stylesheet">
    <link href="css/topbar-shell.css" rel="stylesheet">
    <style>
        body { display: flex; align-items: center; justify-content: center; padding: 0; }
        .auth-card { width: 100%; max-width: 420px; padding: 2.5rem; text-align: center; }
        .brand-logo { font-size: 3.5rem; margin-bottom: 1.5rem; }
         input.form-control { border-radius: 12px; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1.5px solid var(--border); }
         [data-theme='dark'] input.form-control { background: rgba(0,0,0,0.2); color: white; }
    </style>
</head>
<body class="auth-page">
    <div style="position: fixed; top: 20px; right: 20px; z-index: 1000;">
        <button class="theme-toggle" id="themeToggle" type="button">
            <span id="themeIcon">🌙</span>
            <span id="themeLabel">Sombre</span>
        </button>
    </div>
    <div class="page-bg"><div class="bg-img"></div><div class="bg-veil"></div><div class="bg-grid"></div></div>

    <div class="auth-card card anim">
        <div class="brand-logo">🚀</div>
        <h2 class="fw-800 mb-1">Bon retour</h2>
        <p class="text-muted mb-4">Connectez-vous pour accéder à vos analytics</p>

        <form id="loginForm" onsubmit="event.preventDefault(); doLogin();" class="text-start">
            <div class="mb-3">
                <label class="form-label small fw-700">Adresse Email</label>
                <input id="email" type="email" class="form-control" placeholder="nom@exemple.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-700">Mot de passe</label>
                <div class="input-group">
                    <input id="password" type="password" class="form-control" placeholder="••••••••" required>
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePwd()" style="border-radius:0 12px 12px 0;">👁</button>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 py-3 mb-3 fw-700" id="loginBtn">Se connecter</button>
            <p id="msg" class="text-center small"></p>
        </form>

        <div class="mt-4 pt-3 border-top">
            <span class="text-muted small">Nouveau ici ?</span>
            <a href="register.html" class="small fw-700 text-decoration-none ms-1" style="color: var(--primary);">Créer un compte</a>
        </div>
    </div>

    <script src="js/theme-manager.js"></script>
    <script>
        async function doLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');
            const btn = document.getElementById('loginBtn');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Connexion...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.error) {
                    msg.style.color = '#ef4444';
                    msg.textContent = '❌ ' + data.error;
                    btn.disabled = false;
                    btn.textContent = 'Se connecter';
                    return;
                }

                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = data.user.role === 'admin' ? 'admin.html' : 'dash.html';

            } catch (err) {
                msg.style.color = '#ef4444';
                msg.textContent = '❌ Erreur réseau';
                btn.disabled = false;
                btn.textContent = 'Se connecter';
            }
        }
        function togglePwd() {
            const i = document.getElementById('password');
            i.type = i.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
