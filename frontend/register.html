<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte - BusinessApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="css/page-bg.css" rel="stylesheet">
    <link href="css/app-ux.css" rel="stylesheet">
    <link href="css/charts-global-theme.css" rel="stylesheet">
    <link href="css/topbar-shell.css" rel="stylesheet">
    <style>
        body { display: flex; align-items: center; justify-content: center; padding: 0; }
        .auth-card { width: 100%; max-width: 450px; padding: 2.5rem; }
        input.form-control { border-radius: 12px; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1.5px solid var(--border); }
    </style>
</head>
<body class="auth-page">
    <div style="position: fixed; top: 20px; right: 20px; z-index: 1000;">
        <button class="theme-toggle" id="themeToggle" type="button">
            <span id="themeIcon">🌙</span>
            <span id="themeLabel">Sombre</span>
        </button>
    </div>
    <div class="page-bg"><div class="bg-img"></div><div class="bg-veil"></div><div class="bg-grid"></div></div>

    <div class="auth-card card anim">
        <h2 class="fw-800 mb-1 text-center">Créer un compte</h2>
        <p class="text-muted mb-4 text-center">Rejoignez-nous et commencez à analyser vos données.</p>

        <form id="registerForm" onsubmit="event.preventDefault(); doRegister();">
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="form-label small fw-700">Prénom</label>
                    <input id="firstname" type="text" class="form-control" placeholder="Molk" required>
                </div>
                <div class="col-6">
                    <label class="form-label small fw-700">Nom</label>
                    <input id="lastname" type="text" class="form-control" placeholder="H" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-700">Adresse Email</label>
                <input id="email" type="email" class="form-control" placeholder="nom@exemple.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-700">Mot de passe</label>
                <input id="password" type="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 py-3 mb-3 fw-700" id="regBtn">S'inscrire</button>
            <p id="msg" class="text-center small"></p>
        </form>

        <div class="mt-4 pt-3 border-top text-center">
            <span class="text-muted small">Déjà un compte ?</span>
            <a href="index.html" class="small fw-700 text-decoration-none ms-1" style="color: var(--primary);">Se connecter</a>
        </div>
    </div>

    <script src="js/theme-manager.js"></script>
    <script>
        async function doRegister() {
            const firstname = document.getElementById('firstname').value.trim();
            const lastname = document.getElementById('lastname').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');
            const btn = document.getElementById('regBtn');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Traitement...';

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstname, lastname, email, password })
                });
                const data = await res.json();

                if (data.error) {
                    msg.style.color = '#ef4444';
                    msg.textContent = '❌ ' + data.error;
                    btn.disabled = false;
                    btn.textContent = 'S\'inscrire';
                    return;
                }

                msg.style.color = '#10b981';
                msg.textContent = '✅ Compte créé ! Redirection...';
                setTimeout(() => window.location.href = 'index.html', 1500);

            } catch (err) {
                msg.style.color = '#ef4444';
                msg.textContent = '❌ Erreur réseau';
                btn.disabled = false;
                btn.textContent = 'S\'inscrire';
            }
        }
    </script>
</body>
</html>
