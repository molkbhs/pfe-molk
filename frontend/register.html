<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - Auth App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>

<body class="page-auth">

<div class="container">
  <div class="card p-4 shadow">
    <h3 class="text-center mb-4">S'inscrire</h3>

    <!-- Ligne Nom + Prénom -->
    <div class="row">
      <div class="col-md-6 mb-3">
        <input id="firstname" class="form-control" placeholder="Prénom" aria-label="Prénom">
      </div>
      <div class="col-md-6 mb-3">
        <input id="lastname" class="form-control" placeholder="Nom" aria-label="Nom">
      </div>
    </div>

    <!-- Email -->
    <div class="mb-3">
      <input id="email" type="email" class="form-control" placeholder="Votre email" aria-label="Email">
    </div>

    <!-- Mot de passe -->
    <div class="mb-3">
      <div class="input-group">
        <input id="password" type="password" class="form-control" placeholder="Mot de passe (min. 6 caractères)" aria-label="Mot de passe">
        <button class="btn btn-outline-secondary" type="button" onclick="toggleRegisterPasswords()">👁</button>
      </div>
    </div>

    <!-- Confirmation -->
    <div class="mb-3">
      <input id="confirmpass" type="password" class="form-control" placeholder="Confirmer le mot de passe" aria-label="Confirmation">
    </div>

    <button class="btn btn-primary w-100" onclick="register()" id="registerBtn">
      Créer un compte
    </button>

    <p id="msg" class="message text-center mt-2"></p>

    <div class="text-center mt-3">
      Déjà inscrit ? <a href="index.html">Se connecter</a>
    </div>

  </div>
</div>

<script src="js/register.js"></script>
</body>
</html>
