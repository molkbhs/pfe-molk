<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Auth App</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f4f6f9;
      background-image: url("assets/fyu12.jpg");
      background-size: cover;
      background-position: center;
      min-height: 100vh;
    }

    .card {
      border-radius: 16px;
      background: rgba(29, 53, 87, 0.2);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(230, 57, 70, 0.15);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      color: #fff;
      animation: slideIn 0.8s ease-out both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .navbar-brand {
      font-weight: bold;
      font-size: 1.5rem;
      color: darkblue;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .table-wrap {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 8px;
      color: #1f2937;
    }

    #csvStatus {
      font-size: 0.9rem;
      color: #e2e8f0;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top shadow">
  <div class="container-fluid">
    <a class="navbar-brand" href="dashboard.html">BusinessApp</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link active" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="profile.html">Profil</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
      </ul>

      <div class="dropdown">
        <a class="btn btn-light dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" id="navUser"></a>
        <ul class="dropdown-menu dropdown-menu-end" id="userMenu">
          <li><a class="dropdown-item" href="profile.html">Voir le profil</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><button type="button" class="dropdown-item text-danger" id="logoutNav">Deconnexion</button></li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<div class="container mt-5 pt-5 pb-4">
  <div class="card p-4 shadow text-center mb-4">
    <h3>Bienvenue</h3>
    <p id="welcome" class="mb-4"></p>

    <p>
      Connecte en tant que :
      <a href="profile.html" id="dashboardUser" class="fw-bold text-white"></a>
    </p>

    <button class="btn btn-secondary" id="logout">Se deconnecter</button>
  </div>

  <div class="card p-4 shadow">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-2">
      <h5 class="m-0">Contenu CSV utilisateurs</h5>
      <button class="btn btn-sm btn-light" id="refreshCsv">Actualiser</button>
    </div>
    <div id="csvStatus">Chargement...</div>

    <div class="table-responsive table-wrap mt-3">
      <table class="table table-striped table-hover table-sm mb-0">
        <thead id="csvHead"></thead>
        <tbody id="csvBody">
          <tr><td>Chargement...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const user = JSON.parse(localStorage.getItem("user") || "null");
  const showSettings = true;
  const API_BASE = (window.location.origin && window.location.origin !== "null")
    ? window.location.origin
    : "http://127.0.0.1:5000";

  if (!user) {
    window.location.href = "index.html";
  } else {
    document.getElementById("welcome").innerText = `Bienvenue, ${user.username}!`;
    document.getElementById("dashboardUser").innerText = user.username;
    document.getElementById("navUser").innerText = user.username;

    if (showSettings) {
      const settingsItem = document.createElement("li");
      const settingsLink = document.createElement("a");
      settingsLink.className = "dropdown-item";
      settingsLink.href = "settings.html";
      settingsLink.textContent = "Parametres";
      settingsItem.appendChild(settingsLink);

      const menu = document.getElementById("userMenu");
      menu.insertBefore(settingsItem, menu.querySelector("hr"));
    }
  }

  function logout() {
    localStorage.clear();
    sessionStorage.clear();
    const url = (window.location.origin && window.location.origin !== "null")
      ? window.location.origin + "/index.html"
      : "index.html";
    window.location.replace(url);
  }

  function escapeHtml(value) {
    const div = document.createElement("div");
    div.textContent = value == null ? "" : String(value);
    return div.innerHTML;
  }

  function parseCsv(text) {
    const rows = [];
    let row = [];
    let field = "";
    let inQuotes = false;

    for (let i = 0; i < text.length; i++) {
      const char = text[i];
      const next = text[i + 1];

      if (char === '"') {
        if (inQuotes && next === '"') {
          field += '"';
          i++;
        } else {
          inQuotes = !inQuotes;
        }
      } else if (char === "," && !inQuotes) {
        row.push(field);
        field = "";
      } else if ((char === "\n" || char === "\r") && !inQuotes) {
        if (char === "\r" && next === "\n") i++;
        row.push(field);
        if (row.some(cell => cell !== "")) rows.push(row);
        row = [];
        field = "";
      } else {
        field += char;
      }
    }

    if (field.length > 0 || row.length > 0) {
      row.push(field);
      if (row.some(cell => cell !== "")) rows.push(row);
    }

    const headers = rows.length ? rows[0] : [];
    return { headers, rows: rows.slice(1) };
  }

  function renderCsv(headers, rows) {
    const head = document.getElementById("csvHead");
    const body = document.getElementById("csvBody");

    if (!headers.length) {
      head.innerHTML = "";
      body.innerHTML = '<tr><td class="text-center text-muted">Aucune donnee</td></tr>';
      return;
    }

    head.innerHTML = `<tr>${headers.map(h => `<th>${escapeHtml(h)}</th>`).join("")}</tr>`;

    if (!rows.length) {
      body.innerHTML = `<tr><td colspan="${headers.length}" class="text-center text-muted">Aucune ligne</td></tr>`;
      return;
    }

    body.innerHTML = rows.map(r => {
      const cells = headers.map((_, index) => `<td>${escapeHtml(r[index] || "")}</td>`).join("");
      return `<tr>${cells}</tr>`;
    }).join("");
  }

  async function loadCsvUsers() {
    const status = document.getElementById("csvStatus");
    status.textContent = "Chargement du CSV...";

    try {
      const res = await fetch(`${API_BASE}/api/users/export`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const csvText = await res.text();
      const parsed = parseCsv(csvText);
      renderCsv(parsed.headers, parsed.rows);
      status.textContent = `${parsed.rows.length} ligne(s) chargee(s)`;
    } catch (error) {
      document.getElementById("csvHead").innerHTML = "";
      document.getElementById("csvBody").innerHTML =
        '<tr><td class="text-danger text-center">Erreur de chargement du CSV</td></tr>';
      status.textContent = "Echec de chargement";
      console.error(error);
    }
  }

  document.getElementById("logout").addEventListener("click", logout);
  document.getElementById("logoutNav").addEventListener("click", function(e) {
    e.preventDefault();
    e.stopPropagation();
    logout();
  });
  document.getElementById("refreshCsv").addEventListener("click", loadCsvUsers);

  loadCsvUsers();
</script>

</body>
</html>
