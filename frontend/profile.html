<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil - Auth App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-image: url("assets/fyu12.jpg"); background-size: cover; background-position: center; }
    .card {
      max-width: 700px;
      margin: auto;
      text-align: center;
      background: rgba(29, 53, 87, 0.2);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(230, 57, 70, 0.15);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow);
      animation: slideIn 1s ease-out 0.3s both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(50px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 15px;
      display: block;
    }
    .navbar-brand {
      font-weight: bold;
      font-size: 1.5rem;
      color: darkblue;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top shadow">
  <div class="container-fluid">
    <a class="navbar-brand" href="dash.html">BusinessApp</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="dash.html">Dash</a></li>
        <li class="nav-item"><a class="nav-link active" href="profile.html">Profil</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        <li class="nav-item" id="navAdminItem" style="display:none;"><a class="nav-link" href="admin.html">Admin</a></li>
      </ul>
      <div class="dropdown">
        <a class="btn btn-light dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" id="navUser"></a>
        <ul class="dropdown-menu dropdown-menu-end" id="userMenu">
          <li><a class="dropdown-item" href="profile.html">Voir le profil</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item text-danger" href="#" id="logoutNav">Deconnexion</a></li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<div class="container mt-5 pt-5">
  <div class="card p-4 shadow">
    <img src="assets/istockphoto-1288129985-612x612.jpg" alt="Photo profil" class="profile-img">
    <h4 id="firstname"></h4>
    <p id="email" class="text-muted mb-1"></p>
    <p id="role" class="text-secondary mb-1"></p>
    <p id="memberSince" class="text-muted mb-3"></p>

    <div class="row g-2 mb-3" id="miniSaas">
      <div class="col-4"><div class="border rounded p-2"><small>Type</small><div id="loginType">email</div></div></div>
      <div class="col-4"><div class="border rounded p-2"><small>Role</small><div id="roleMini">user</div></div></div>
      <div class="col-4"><div class="border rounded p-2"><small>Etat</small><div>actif</div></div></div>
    </div>

    <hr>

    <form id="profileForm">
      <div class="mb-3 text-start">
        <label for="newFirstname" class="form-label">Prenom</label>
        <input type="text" class="form-control" id="newFirstname" required>
      </div>
      <div class="mb-3 text-start">
        <label for="newLastname" class="form-label">Nom</label>
        <input type="text" class="form-control" id="newLastname" required>
      </div>
      <div class="mb-3 text-start">
        <label for="newEmail" class="form-label">Email</label>
        <input type="email" class="form-control" id="newEmail" required>
      </div>
      <button id="btnSaveProfile" type="submit" class="btn btn-primary w-100">Mettre a jour</button>
    </form>

    <div class="text-center mt-3">
      <button class="btn btn-secondary" type="button" id="logout">Deconnexion</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API_BASE = (window.location.origin && window.location.origin.includes(':5000'))
    ? window.location.origin
    : 'http://127.0.0.1:5000';

  const user = JSON.parse(localStorage.getItem('user') || 'null');
  const showSettings = true;

  if (!user || !user.id) {
    window.location.href = 'index.html';
  } else {
    document.getElementById('navUser').innerText = user.username || user.email;
    if (user.role === 'admin') {
      const navAdminItem = document.getElementById('navAdminItem');
      if (navAdminItem) navAdminItem.style.display = 'list-item';
    }

    hydrateProfileFromLocalState();

    if (showSettings) {
      const settingsItem = document.createElement('li');
      const settingsLink = document.createElement('a');
      settingsLink.className = 'dropdown-item';
      settingsLink.href = 'settings.html';
      settingsLink.textContent = 'Parametres';
      settingsItem.appendChild(settingsLink);
      const menu = document.getElementById('userMenu');
      menu.insertBefore(settingsItem, menu.querySelector('hr'));
    }

    loadProfileDetails();
  }

  function hydrateProfileFromLocalState() {
    document.getElementById('firstname').innerText = `${user.firstname || ''} ${user.lastname || ''}`.trim();
    document.getElementById('email').innerText = user.email || '';
    document.getElementById('role').innerText = user.role || 'user';

    document.getElementById('newFirstname').value = user.firstname || '';
    document.getElementById('newLastname').value = user.lastname || '';
    document.getElementById('newEmail').value = user.email || '';
  }

  async function loadProfileDetails() {
    try {
      const res = await fetch(`${API_BASE}/api/profile/${user.id}`);
      const data = await res.json();
      if (!res.ok || data.error) return;

      user.firstname = data.firstname || user.firstname;
      user.lastname = data.lastname || user.lastname;
      user.email = data.email || user.email;
      user.role = data.role || user.role;
      user.login_type = data.login_type || user.login_type || 'email';
      user.username = (user.email || '').includes('@') ? user.email.split('@')[0] : user.username;
      localStorage.setItem('user', JSON.stringify(user));

      hydrateProfileFromLocalState();
      document.getElementById('memberSince').innerText = `Membre depuis: ${data.created_at || 'N/A'}`;
      document.getElementById('roleMini').innerText = user.role || 'user';
      document.getElementById('loginType').innerText = user.login_type || 'email';
      document.getElementById('navUser').innerText = user.username || user.email;
    } catch (_) {}
  }

  document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const firstname = document.getElementById('newFirstname').value.trim();
    const lastname = document.getElementById('newLastname').value.trim();
    const email = document.getElementById('newEmail').value.trim();

    if (!firstname || !lastname || !email) {
      alert('Tous les champs sont obligatoires.');
      return;
    }

    try {
      const res = await fetch(`${API_BASE}/api/profile/${user.id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ firstname, lastname, email })
      });

      const data = await res.json();
      if (!res.ok || data.error) {
        alert(data.error || 'Erreur de mise a jour');
        return;
      }

      const updated = data.user || { firstname, lastname, email };
      user.firstname = updated.firstname || firstname;
      user.lastname = updated.lastname || lastname;
      user.email = updated.email || email;
      user.role = updated.role || user.role;
      user.login_type = updated.login_type || user.login_type || 'email';
      user.username = (user.email || '').includes('@') ? user.email.split('@')[0] : user.username;

      localStorage.setItem('user', JSON.stringify(user));

      hydrateProfileFromLocalState();
      document.getElementById('roleMini').innerText = user.role || 'user';
      document.getElementById('loginType').innerText = user.login_type || 'email';
      document.getElementById('navUser').innerText = user.username || user.email;

      alert('Profil mis a jour avec succes.');
    } catch (err) {
      alert('Erreur reseau. Verifiez que le backend est sur http://127.0.0.1:5000');
    }
  });

  function logout() {
    localStorage.clear();
    sessionStorage.clear();
    const url = (window.location.origin && window.location.origin !== 'null') ? window.location.origin + '/index.html' : 'index.html';
    window.location.replace(url);
  }

  document.getElementById('logout').addEventListener('click', logout);
  document.getElementById('logoutNav').addEventListener('click', function (e) {
    e.preventDefault();
    e.stopPropagation();
    logout();
  });

  document.getElementById('btnSaveProfile')?.addEventListener('click', function () {
    // feedback visuel simple pour confirmer le clic utilisateur
    this.style.opacity = '0.9';
    setTimeout(() => { this.style.opacity = '1'; }, 120);
  });
</script>
</body>
</html>
